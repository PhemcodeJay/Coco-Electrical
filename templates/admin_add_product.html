{% extends 'base.html' %}
{% block title %}Admin - Add Product{% endblock %}

{% block content %}
<section class="container py-4">
    <h1 class="mb-4">Add New Product</h1>

    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label for="name" class="form-label">Product Name *</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                </div>
                <div class="mb-3">
                    <label for="price" class="form-label">Price (₦) *</label>
                    <input type="number" class="form-control" id="price" name="price" min="0" step="0.01" required>
                </div>
                <div class="mb-3">
                    <label for="category" class="form-label">Category *</label>
                    <select class="form-select" id="category" name="category" required>
                        <option value="">Select Category</option>
                        <option value="Kitchen Appliances">Kitchen Appliances</option>
                        <option value="Lighting">Lighting</option>
                        <option value="Tools">Tools</option>
                        <option value="Accessories">Accessories</option>
                        <option value="Refrigeration">Refrigeration</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="image_url" class="form-label">Image URL</label>
                    <input type="url" class="form-control" id="image_url" name="image_url" placeholder="https://example.com/image.jpg">
                </div>
                <div class="mb-3">
                    <label for="stock" class="form-label">Stock Quantity *</label>
                    <input type="number" class="form-control" id="stock" name="stock" min="0" required>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Add Product</button>
                    <a href="{{ url_for('admin_products') }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
