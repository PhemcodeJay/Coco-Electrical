{% extends 'base.html' %}
{% block title %}Page Not Found - Coco Household Store{% endblock %}
{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <i class="bi bi-exclamation-triangle display-1 text-warning"></i>
            <h1 class="display-4 mt-4">404</h1>
            <h2 class="h4 mb-4">Page Not Found</h2>
            <p class="lead">The page you're looking for doesn't exist or has been moved.</p>
            <a href="{{ url_for('index') }}" class="btn btn-primary mt-3">Go to Homepage</a>
        </div>
    </div>
</div>
{% endblock %}
